<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Видео</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    video {
      max-width: 100%;
      max-height: 100vh;
    }
  </style>
</head>
<body>

  <video id="video" controls autoplay playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>

  <script>
    const video = document.getElementById("video");

    // попытка включить звук и запустить
    window.addEventListener("load", async () => {
      try {
        video.muted = false;
        await video.play();
      } catch (e) {
        // если браузер запретил — просто ничего не ломаем
        console.log("Автозвук заблокирован браузером");
      }
    });
  </script>

</body>
</html>
